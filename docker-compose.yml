version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Monta os certificados do Let's Encrypt
      - /etc/letsencrypt/live/landing.profissionallucassilva.shop/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/landing.profissionallucassilva.shop/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - web
    networks:
      - webnet

  web:
    image: nginx:alpine
    container_name: frontend_site
    volumes:
      - ./treino-site:/usr/share/nginx/html:ro
    networks:
      - webnet

networks:
  webnet:
