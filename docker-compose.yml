version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/landing.profissionallucassilva.shop/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/landing.profissionallucassilva.shop/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - web
    networks:
      - webnet

  web:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.nginx
    image: lucasdev18/site-personal:latest
    container_name: frontend_site
    restart: always
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
